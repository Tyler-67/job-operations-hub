# Per-function JWT posture (PROD-JWT). Cron functions are invoked by pg_cron/pg_net
# with an x-cron-secret header and must NOT require a Supabase JWT -> verify_jwt = false.
# Every other function is app/webhook/forms-facing and keeps verify_jwt = true
# (internal x-app-session / x-cron-secret / action-token / payload checks still apply).
# This mirrors the verified-live staging posture (only the 4 cron-* are false).

[functions.cron-drain-notifications]
verify_jwt = false

[functions.cron-inspection-reminders]
verify_jwt = false

